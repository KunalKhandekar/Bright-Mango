services:
  app:
    image: ghcr.io/kunalkhandekar/bright-mango:${IMAGE_TAG:-latest}
    command: ["node", "dist/server.js"]
    env_file: .env
    environment:
      RUN_INLINE_WORKERS: "false"     # API container must NOT start workers
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [internal]

  worker:
    image: ghcr.io/kunalkhandekar/bright-mango:${IMAGE_TAG:-latest}
    command: ["node", "dist/worker.js"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data          # certificates & ACME account — MUST persist
      - caddy-config:/config
    restart: unless-stopped
    networks: [internal]

volumes:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge